<!DOCTYPE html>
<html>
<head>
    <title>Flatmate Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏠 Flatmate Scheduler</h1>

<div class="controls">
    <input id="p1" placeholder="Person 1">
    <input id="p2" placeholder="Person 2">
    <input id="p3" placeholder="Person 3">
    <input id="p4" placeholder="Person 4">
    <button onclick="generate()">Update</button>
</div>

<div class="calendar" id="calendar"></div>

<div id="details" class="details">
    <h2>Select a day to view tasks</h2>
</div>

<script src="script.js"></script>
</body>
</html>
